name: facturation_app
description: Invoicing and job management for small businesses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_riverpod: ^2.5.1
  pdf: ^3.11.0
  printing: ^5.14.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  table_calendar: ^3.1.2
  alarm: ^5.2.1

dependency_overrides:
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - assets/app_icon.png
