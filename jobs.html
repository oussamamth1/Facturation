<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travaux clients - Facturation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        @media print {
            @page {
                size: A4;
                margin: 12mm;
            }

            html, body {
                background: #fff !important;
                padding: 0 !important;
            }

            .no-print {
                display: none !important;
            }

            .jobs-layout-grid {
                display: block !important;
            }

            .jobs-print-box {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
            }

            .jobs-print-header {
                display: block !important;
            }

            .jobs-print-col {
                display: table-cell !important;
            }

            .jobs-print-table thead th {
                background: #4b5563 !important;
                color: #fff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .jobs-print-table tbody tr:nth-child(even) {
                background: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .jobs-print-table {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 11px;
            }

            .jobs-print-summary-row {
                display: table-row !important;
                background: #e5e7eb !important;
                font-weight: 700;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .jobs-print-table input, .jobs-print-table select, .jobs-print-table textarea {
                border: none !important;
                outline: none !important;
                background: transparent !important;
            }

            .jobs-print-table .no-print {
                display: none !important;
            }
        }

        @media screen {
            .jobs-print-header {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="no-print mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">
                    Travaux clients
                </h1>
                <p class="text-slate-500 mt-1 text-sm md:text-base">
                    Suivi des interventions (lieu, service, prix, date).
                </p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <a href="index.html" class="no-print inline-flex items-center px-3 py-2 rounded-full text-xs font-semibold border border-slate-300 text-slate-600 hover:bg-slate-50">
                    ← Retour au dashboard
                </a>
                <button type="button" onclick="prepareJobsPrint()" class="no-print inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-full shadow-sm text-xs md:text-sm">
                    Imprimer / PDF
                </button>
                <p id="jobs-user-label" class="text-xs text-slate-500 no-print"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 jobs-layout-grid">
            <!-- Form -->
            <section class="no-print bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h2 class="text-sm font-semibold text-slate-800 mb-4">Ajouter / Modifier un travail</h2>
                <input type="hidden" id="job-id">
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Client</label>
                        <input id="job-client" type="text" placeholder="Nom du client"
                               list="jobs-clients-datalist"
                               class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <datalist id="jobs-clients-datalist"></datalist>
                        <p id="job-client-hint" class="mt-1 text-[11px] text-slate-400"></p>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Adresse / Lieu</label>
                        <textarea id="job-location" placeholder="Adresse du chantier"
                                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 h-16"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Service</label>
                        <input id="job-service" type="text" placeholder="Ex: Installation eau, réparation fuite..."
                               class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Prix</label>
                            <input id="job-price" type="number" step="0.01" placeholder="0.00"
                                   class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Date</label>
                            <input id="job-date" type="date"
                                   class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Montant reçu</label>
                            <input id="job-amount-paid" type="number" step="0.01" placeholder="0.00"
                                   class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Reste à encaisser</label>
                            <input id="job-amount-remaining" type="number" step="0.01" placeholder="0.00" readonly
                                   class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-700">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Statut</label>
                        <select id="job-status"
                                class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="planned">Planifié</option>
                            <option value="in_progress">En cours</option>
                            <option value="done">Terminé</option>
                            <option value="cancelled">Annulé</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Notes</label>
                        <textarea id="job-notes" placeholder="Détails supplémentaires, matériel, remarques..."
                                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 h-16"></textarea>
                    </div>
                </div>
                <div class="mt-4 flex flex-wrap gap-2">
                    <button type="button" onclick="saveJob()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-sm">
                        Enregistrer le travail
                    </button>
                    <button type="button" onclick="resetJobForm()" class="text-slate-500 text-xs font-medium px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50">
                        Nouveau
                    </button>
                    <button type="button" onclick="sendCurrentJobToInvoice()" class="bg-sky-600 hover:bg-sky-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-sm">
                        Créer une facture (ce travail)
                    </button>
                </div>
            </section>

            <!-- List (zone imprimable) -->
            <section class="jobs-print-box bg-white border border-slate-200 rounded-2xl p-5 shadow-sm overflow-x-auto">
                <div class="jobs-print-header mb-4 pb-3 border-b border-slate-300">
                    <h1 id="jobs-print-title" class="text-xl font-bold text-slate-900">Travaux clients</h1>
                    <p id="jobs-print-meta" class="text-sm text-slate-600 mt-1"></p>
                </div>
                <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-3 no-print">
                    <div>
                        <h2 class="text-sm font-semibold text-slate-800">Travaux enregistrés</h2>
                        <span class="text-[11px] text-slate-400">Ligne = modifier · boutons ou corbeille</span>
                    </div>
                    <div class="w-full sm:w-64">
                        <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Filtrer par client</label>
                        <input type="search" id="jobs-filter-client" placeholder="Nom du client…"
                               class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
                <table class="jobs-print-table min-w-full text-left text-xs md:text-sm border-collapse border border-slate-200">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 border-b border-slate-200 print:bg-transparent print:text-white">
                            <th class="py-2 px-2 md:px-3">Date</th>
                            <th class="py-2 px-2 md:px-3">Client</th>
                            <th class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col">Service</th>
                            <th class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col text-right">Lieu</th>
                            <th class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col text-center">Statut</th>
                            <th class="py-2 px-2 md:px-3 text-right">Total</th>
                            <th class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col">Reçu</th>
                            <th class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col">Reste</th>
                            <th class="no-print py-2 px-2 md:px-3 text-right whitespace-nowrap">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobs-table" class="divide-y divide-slate-100 text-slate-700">
                        <!-- Rows injected -->
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script>
        let auth = null;
        let db = null;
        let currentUser = null;
        let currentUserId = null;
        let jobs = [];
        let unsubscribeJobs = null;
        let jobsClients = [];

        const jobsMoney = new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function formatJobsMoney(n) {
            return jobsMoney.format(Number(n) || 0);
        }

        function formatJobsDate(iso) {
            if (!iso) return '';
            const p = String(iso).split('-');
            if (p.length !== 3) return iso;
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        const JOB_STATUS_LABELS = {
            planned: 'Planifié',
            in_progress: 'En cours',
            done: 'Terminé',
            cancelled: 'Annulé',
        };

        function jobStatusLabel(status) {
            return JOB_STATUS_LABELS[status] || status || '';
        }

        async function prepareJobsPrint() {
            const titleEl = document.getElementById('jobs-print-title');
            const metaEl = document.getElementById('jobs-print-meta');
            if (metaEl) {
                metaEl.textContent = 'Liste générée le ' + new Date().toLocaleString('fr-FR', {
                    dateStyle: 'long',
                    timeStyle: 'short',
                });
            }
            if (titleEl) {
                titleEl.textContent = 'Travaux clients';
                if (db && currentUserId) {
                    try {
                        const snap = await db.collection('settings').doc('enterprise_' + currentUserId).get();
                        const ent = snap.exists ? snap.data() : null;
                        if (ent && ent.name) {
                            titleEl.textContent = ent.name + ' — Travaux clients';
                        }
                    } catch (e) {
                        console.warn('prepareJobsPrint settings', e);
                    }
                }
            }
            setTimeout(() => window.print(), 120);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyC6dSEsP6iRBFaXr8qjX13PVTt5Q17eZqM",
            authDomain: "testf-2497a.firebaseapp.com",
            projectId: "testf-2497a",
            storageBucket: "testf-2497a.firebasestorage.app",
            messagingSenderId: "516716068209",
            appId: "1:516716068209:web:32c05182c91d1b7ee04ad0",
            measurementId: "G-EJ2SLNRBQP",
        };

        function getJobsFiltered() {
            const q = (document.getElementById('jobs-filter-client')?.value || '').trim().toLowerCase();
            if (!q) return jobs;
            return jobs.filter(j => (j.client || '').toLowerCase().includes(q));
        }

        function renderJobsTable() {
            const tbody = document.getElementById('jobs-table');
            tbody.innerHTML = '';
            const list = getJobsFiltered();
            let sumPrice = 0;
            let sumPaid = 0;
            list.forEach(job => {
                const price = Number(job.price || 0);
                const paid = Number(job.amountPaid || 0);
                const rest = price - paid;
                sumPrice += price;
                sumPaid += paid;
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 cursor-pointer';
                const loc = (job.location || '').replace(/</g, '&lt;').replace(/&/g, '&amp;');
                const client = (job.client || '').replace(/</g, '&lt;').replace(/&/g, '&amp;');
                const service = (job.service || '').replace(/</g, '&lt;').replace(/&/g, '&amp;');
                tr.innerHTML = `
                    <td class="py-2 px-2 md:px-3 whitespace-nowrap">${formatJobsDate(job.date)}</td>
                    <td class="py-2 px-2 md:px-3">${client}</td>
                    <td class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col">${service}</td>
                    <td class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col text-slate-600">${loc}</td>
                    <td class="py-2 px-2 md:px-3 hidden md:table-cell jobs-print-col text-center text-slate-600">${jobStatusLabel(job.status)}</td>
                    <td class="py-2 px-2 md:px-3 text-right tabular-nums">${formatJobsMoney(price)}</td>
                    <td class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col tabular-nums">${formatJobsMoney(paid)}</td>
                    <td class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col tabular-nums">${formatJobsMoney(rest)}</td>
                    <td class="no-print py-2 px-2 md:px-3 text-right whitespace-nowrap" onclick="event.stopPropagation()">
                        <button type="button" class="text-blue-600 hover:text-blue-800 text-xs font-semibold mr-1">Modifier</button>
                        <button type="button" class="text-sky-600 hover:text-sky-800 text-xs font-semibold mr-1">Facture</button>
                        <button type="button" class="text-red-600 hover:text-red-800 text-xs font-semibold">Supprimer</button>
                    </td>
                `;
                tr.addEventListener('click', () => loadJobIntoForm(job.id));
                const btns = tr.querySelectorAll('button');
                btns[0].addEventListener('click', e => {
                    e.stopPropagation();
                    loadJobIntoForm(job.id);
                });
                btns[1].addEventListener('click', e => {
                    e.stopPropagation();
                    openInvoiceFromJob(job);
                });
                btns[2].addEventListener('click', e => {
                    e.stopPropagation();
                    deleteJobById(job.id);
                });
                tbody.appendChild(tr);
            });
            const sumRest = sumPrice - sumPaid;
            const foot = document.createElement('tr');
            foot.className = 'jobs-print-summary-row border-t-2 border-slate-300';
            const totalLabel = list.length === jobs.length
                ? `Totaux (${list.length} travail${list.length !== 1 ? 'x' : ''})`
                : `Totaux filtrés (${list.length} sur ${jobs.length})`;
            foot.innerHTML = `
                <td class="py-2 px-2 md:px-3" colspan="5">${totalLabel}</td>
                <td class="py-2 px-2 md:px-3 text-right tabular-nums">${formatJobsMoney(sumPrice)}</td>
                <td class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col tabular-nums">${formatJobsMoney(sumPaid)}</td>
                <td class="py-2 px-2 md:px-3 text-right hidden md:table-cell jobs-print-col tabular-nums">${formatJobsMoney(sumRest)}</td>
                <td class="no-print py-2 px-2 md:px-3"></td>
            `;
            foot.addEventListener('click', e => e.stopPropagation());
            tbody.appendChild(foot);
        }

        function jobToInvoicePayload(job) {
            return {
                id: job.id || '',
                client: job.client || '',
                location: job.location || '',
                service: job.service || '',
                price: Number(job.price) || 0,
                date: job.date || '',
                notes: job.notes || '',
            };
        }

        function openInvoiceFromJob(job) {
            if (!job) return;
            if (!(job.client || '').trim() || !(job.service || '').trim()) {
                alert('Ce travail doit avoir un client et un service.');
                return;
            }
            try {
                sessionStorage.setItem('facturation_import_job', JSON.stringify(jobToInvoicePayload(job)));
                window.location.href = 'index.html?importJob=1';
            } catch (e) {
                console.error(e);
                alert('Impossible d\'ouvrir la facturation.');
            }
        }

        function sendCurrentJobToInvoice() {
            const client = document.getElementById('job-client').value.trim();
            const service = document.getElementById('job-service').value.trim();
            if (!client || !service) {
                alert('Renseignez au moins le client et le service pour créer une facture.');
                return;
            }
            const payload = {
                id: document.getElementById('job-id').value || '',
                client,
                location: document.getElementById('job-location').value.trim(),
                service,
                price: parseFloat(document.getElementById('job-price').value || '0'),
                date: document.getElementById('job-date').value || '',
                notes: document.getElementById('job-notes').value.trim(),
            };
            try {
                sessionStorage.setItem('facturation_import_job', JSON.stringify(payload));
                window.location.href = 'index.html?importJob=1';
            } catch (e) {
                console.error(e);
                alert('Impossible d\'ouvrir la facturation.');
            }
        }

        async function deleteJobById(id) {
            if (!id || !confirm('Supprimer définitivement ce travail ?')) return;
            if (!db || !currentUserId) {
                alert('Connectez-vous d\'abord.');
                return;
            }
            try {
                await db.collection('jobs').doc(id).delete();
            } catch (err) {
                console.error('deleteJobById', err);
                alert('Impossible de supprimer le travail.');
            }
        }

        function resetJobForm() {
            document.getElementById('job-id').value = '';
            document.getElementById('job-client').value = '';
            document.getElementById('job-location').value = '';
            document.getElementById('job-service').value = '';
            document.getElementById('job-price').value = '';
            document.getElementById('job-date').value = '';
            document.getElementById('job-status').value = 'planned';
            document.getElementById('job-notes').value = '';
            document.getElementById('job-amount-paid').value = '';
            document.getElementById('job-amount-remaining').value = '';
            const hint = document.getElementById('job-client-hint');
            if (hint) hint.textContent = '';
        }

        function loadJobIntoForm(id) {
            const job = jobs.find(j => j.id === id);
            if (!job) return;
            document.getElementById('job-id').value = job.id;
            document.getElementById('job-client').value = job.client || '';
            document.getElementById('job-location').value = job.location || '';
            document.getElementById('job-service').value = job.service || '';
            document.getElementById('job-price').value = job.price || '';
            document.getElementById('job-date').value = job.date || '';
            document.getElementById('job-status').value = job.status || 'planned';
            document.getElementById('job-notes').value = job.notes || '';
            document.getElementById('job-amount-paid').value = job.amountPaid || '';
            document.getElementById('job-amount-remaining').value = ((job.price || 0) - (job.amountPaid || 0)).toFixed(2);
            updateJobClientHint();
        }

        async function saveJob() {
            if (!db || !currentUserId) {
                alert('Connectez-vous d\'abord.');
                return;
            }
            const id = document.getElementById('job-id').value || Date.now().toString();
            const client = document.getElementById('job-client').value.trim();
            const location = document.getElementById('job-location').value.trim();
            const service = document.getElementById('job-service').value.trim();
            const price = parseFloat(document.getElementById('job-price').value || '0');
            const date = document.getElementById('job-date').value || '';
            const status = document.getElementById('job-status').value || 'planned';
            const notes = document.getElementById('job-notes').value.trim();
            const amountPaid = parseFloat(document.getElementById('job-amount-paid').value || '0');

            if (!client || !service) {
                alert('Client et service sont obligatoires.');
                return;
            }

            const job = { id, client, location, service, price, date, status, notes, amountPaid };
            const existingIndex = jobs.findIndex(j => j.id === id);
            if (existingIndex >= 0) {
                jobs[existingIndex] = job;
            } else {
                jobs.push(job);
            }
            renderJobsTable();

            try {
                await db.collection('jobs').doc(id).set({
                    ...job,
                    userId: currentUserId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                }, { merge: true });
            } catch (err) {
                console.error('saveJob failed', err);
                alert('Erreur lors de la sauvegarde du travail.');
            }

            resetJobForm();
        }

        function attachJobsListener() {
            if (!db || !currentUserId) return;
            if (unsubscribeJobs) unsubscribeJobs();
            unsubscribeJobs = db.collection('jobs')
                .where('userId', '==', currentUserId)
                .onSnapshot(snap => {
                    jobs = snap.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .sort((a, b) => {
                            const av = a.date || '';
                            const bv = b.date || '';
                            return bv.localeCompare(av);
                        });
                    renderJobsTable();
                }, err => console.error('jobs listener error', err));

            // Also load this user's clients for the datalist
            db.collection('clients')
                .where('userId', '==', currentUserId)
                .onSnapshot(snap => {
                    jobsClients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const dl = document.getElementById('jobs-clients-datalist');
                    if (!dl) return;
                    dl.innerHTML = '';
                    jobsClients.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.name || '';
                        dl.appendChild(opt);
                    });
                }, err => console.error('jobs clients listener error', err));
        }

        function handleAuthStateChanged(user) {
            currentUser = user;
            currentUserId = user ? user.uid : null;

            const label = document.getElementById('jobs-user-label');
            if (!user) {
                if (label) label.textContent = 'Non connecté';
                jobs = [];
                renderJobsTable();
                return;
            }

            if (label) label.textContent = user.email || user.uid;
            attachJobsListener();
        }

        function updateJobClientHint() {
            const input = document.getElementById('job-client');
            const hint = document.getElementById('job-client-hint');
            if (!input || !hint) return;

            const name = input.value.trim().toLowerCase();
            if (!name) {
                hint.textContent = '';
                return;
            }

            const existing = jobsClients.find(c => (c.name || '').toLowerCase() === name);
            if (existing) {
                hint.textContent = 'Client existant (issu de la liste Clients).';
                // Auto-remplir lieu si vide
                const locInput = document.getElementById('job-location');
                if (locInput && !locInput.value.trim() && existing.address) {
                    locInput.value = existing.address;
                }
            } else {
                hint.textContent = 'Nouveau client (spécifique à ce travail).';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();

            auth.onAuthStateChanged(handleAuthStateChanged);
            const clientInput = document.getElementById('job-client');
            if (clientInput) {
                clientInput.addEventListener('input', () => {
                    updateJobClientHint();
                });
            }

            const priceInput = document.getElementById('job-price');
            const paidInput = document.getElementById('job-amount-paid');
            if (priceInput && paidInput) {
                const recalc = () => {
                    const price = parseFloat(priceInput.value || '0');
                    const paid = parseFloat(paidInput.value || '0');
                    const remaining = price - paid;
                    const remInput = document.getElementById('job-amount-remaining');
                    if (remInput) remInput.value = remaining.toFixed(2);
                };
                priceInput.addEventListener('input', recalc);
                paidInput.addEventListener('input', recalc);
            }

            const jobsFilter = document.getElementById('jobs-filter-client');
            if (jobsFilter) {
                jobsFilter.addEventListener('input', () => renderJobsTable());
            }
        });
    </script>
</body>
</html>
