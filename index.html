<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .invoice-box { box-shadow: none; border: none; width: 100%; }
            input { border: none !important; outline: none !important; }
        }
    </style>
</head>
<body class="bg-gray-200 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white p-8 shadow-2xl rounded-lg invoice-box">
        
        <!-- Header: Enterprise & Date -->
        <div class="flex justify-between items-start border-b-2 border-blue-600 pb-6">
            <div>
                <input type="text" placeholder="YOUR ENTERPRISE NAME" class="text-3xl font-bold text-blue-600 w-full outline-none focus:bg-blue-50 p-1 rounded" id="ent-name">
                <textarea placeholder="Address, Phone, Email" class="block w-full mt-2 text-gray-600 outline-none focus:bg-blue-50 p-1 rounded h-20"></textarea>
            </div>
            <div class="text-right">
                <h2 class="text-4xl text-gray-400 uppercase tracking-widest mb-4">Facture</h2>
                <div class="flex items-center justify-end">
                    <span class="mr-2 font-bold">Date:</span>
                    <input type="date" id="date-field" class="border border-gray-300 rounded px-2 py-1">
                </div>
            </div>
        </div>

        <!-- Client Section -->
        <div class="my-8">
            <h3 class="font-bold text-gray-700 mb-2 uppercase text-sm tracking-wider">Bill To:</h3>
            <input type="text" placeholder="Client Name / Enterprise" class="text-xl block w-full outline-none focus:bg-blue-50 p-1 mb-1">
            <textarea placeholder="Client Address" class="block w-full text-gray-500 outline-none focus:bg-blue-50 p-1 rounded h-16"></textarea>
        </div>

        <!-- Products Table -->
        <table class="w-full mt-8 text-left border-collapse">
            <thead>
                <tr class="bg-blue-600 text-white">
                    <th class="p-3 rounded-l">Product Description</th>
                    <th class="p-3 text-right">Qty</th>
                    <th class="p-3 text-right">Price</th>
                    <th class="p-3 text-right rounded-r">Total</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr class="border-b">
                    <td class="p-3"><input type="text" placeholder="Product Name" class="w-full outline-none p-1"></td>
                    <td class="p-3 text-right"><input type="number" value="1" min="1" class="qty w-16 text-right outline-none p-1" oninput="calculate()"></td>
                    <td class="p-3 text-right"><input type="number" value="0" step="0.01" class="price w-24 text-right outline-none p-1" oninput="calculate()"></td>
                    <td class="p-3 text-right font-bold row-total">$0.00</td>
                </tr>
            </tbody>
        </table>

        <!-- Controls -->
        <button onclick="addRow()" class="no-print mt-4 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full text-sm font-bold transition">
            + Add Product
        </button>

        <!-- Totals -->
        <div class="mt-10 flex justify-end">
            <div class="w-full md:w-1/3 bg-gray-50 p-4 rounded-lg">
                <div class="flex justify-between py-2 text-gray-600">
                    <span>Subtotal:</span>
                    <span id="subtotal-val">$0.00</span>
                </div>
                <div class="flex justify-between py-3 border-t-2 border-gray-200 mt-2 font-black text-2xl text-blue-700">
                    <span>TOTAL:</span>
                    <span id="total-val">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Footer Note -->
        <div class="mt-20 border-t pt-4">
            <textarea placeholder="Payment notes: Bank Transfer details, Thank you note, etc." class="w-full text-sm text-gray-500 italic outline-none"></textarea>
        </div>
    </div>

    <!-- Floating Print Button -->
    <div class="fixed bottom-10 right-10 no-print">
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full shadow-xl transform hover:scale-105 transition">
            Print / Save as PDF
        </button>
    </div>

    <script>
        // Set today's date automatically
        document.getElementById('date-field').valueAsDate = new Date();

        function addRow() {
            const table = document.getElementById('product-list');
            const row = document.createElement('tr');
            row.className = "border-b";
            row.innerHTML = `
                <td class="p-3"><input type="text" placeholder="Product Name" class="w-full outline-none p-1"></td>
                <td class="p-3 text-right"><input type="number" value="1" min="1" class="qty w-16 text-right outline-none p-1" oninput="calculate()"></td>
                <td class="p-3 text-right"><input type="number" value="0" step="0.01" class="price w-24 text-right outline-none p-1" oninput="calculate()"></td>
                <td class="p-3 text-right font-bold row-total">$0.00</td>
            `;
            table.appendChild(row);
        }

        function calculate() {
            let grandTotal = 0;
            const rows = document.querySelectorAll('#product-list tr');
            
            rows.forEach(row => {
                const qty = row.querySelector('.qty').value || 0;
                const price = row.querySelector('.price').value || 0;
                const total = qty * price;
                row.querySelector('.row-total').innerText = '$' + total.toFixed(2);
                grandTotal += total;
            });

            document.getElementById('subtotal-val').innerText = '$' + grandTotal.toFixed(2);
            document.getElementById('total-val').innerText = '$' + grandTotal.toFixed(2);
        }

        // Initial calculation
        calculate();
    </script>
</body>
</html>
